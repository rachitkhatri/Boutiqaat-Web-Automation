# ============================================================
# pytest.ini — Pytest configuration.
# Controls test discovery, output format, and custom markers.
# ============================================================

[pytest]

# Where pytest looks for test files
testpaths = tests

# Command-line options applied to every pytest run
# -v = verbose (show each test name)
# --tb=short = compact traceback (easier to read than full)
# -p no:warnings = suppress deprecation noise from third-party libs
# --capture=no = show print statements and logs in real-time (CI-friendly)
# --log-cli-level=INFO = show INFO level logs in console
addopts = -v --tb=short -p no:warnings --capture=no --log-cli-level=INFO

# Enable live logging (logs appear as tests run, not after)
log_cli = true
log_cli_level = INFO
log_cli_format = [%(asctime)s] [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# File logging configuration
log_file = logs/pytest_execution.log
log_file_level = DEBUG
log_file_format = [%(asctime)s] [%(levelname)s] [%(filename)s:%(lineno)d] %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Register custom markers — avoids PytestUnknownMarkWarning
markers =
    smoke:       Quick sanity checks (subset of regression)
    regression:  Full end-to-end regression suite
    registration: Registration-specific tests
    cart:        Cart add and remove tests
    wishlist:    Wishlist add and remove tests
    address:     Address management tests (add, edit, second address)
    navigation:  Category, brand, and navigation page tests
